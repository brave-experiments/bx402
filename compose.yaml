services:
  bx402:
    build: .
    ports:
      - "8080:8080"
    environment:
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY}
      X402_FACILITATOR_URL: http://facilitator:8080
      MPP_RPC_URL: ${MPP_RPC_URL:-https://rpc.moderato.tempo.xyz}
      MPP_SECRET_KEY: ${MPP_SECRET_KEY}
    depends_on:
      facilitator:
        condition: service_healthy

  facilitator:
    image: ghcr.io/x402-rs/x402-facilitator:1.5.6
    volumes:
      - ./facilitator/config.json:/app/config.json:ro
    environment:
      X402_FACILITATOR_PRIVATE_KEY: ${X402_FACILITATOR_PRIVATE_KEY}
      BASE_MAINNET_RPC: ${BASE_MAINNET_RPC:-https://mainnet.base.org}
      BASE_SEPOLIA_RPC: ${BASE_SEPOLIA_RPC:-https://sepolia.base.org}
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 12
